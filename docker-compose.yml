version: '3.8'

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:main
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - TZ=UTC
      - OPENCLAW_GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK=true
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json
      - OPENCLAW_STATE_DIR=/home/node/.openclaw
      - OPENROUTER_API_KEY=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
      - OPENCLAW_GATEWAY_TOKEN=olympic-hub-secret-token-2026
      - OPENCLAW_MODELS_PROXY_PORT=18790
      - OPENCLAW_BIND_ADDR=0.0.0.0
      - OPENAI_API_KEY=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
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      # - GEMINI_API_KEY=AIzaSyAu8Jcwwn4iH2vHxJltkNE8LB7RkGGgPgg
      # - GOOGLE_GENERATIVE_AI_API_KEY=AIzaSyAu8Jcwwn4iH2vHxJltkNE8LB7RkGGgPgg
      # - GOOGLE_AI_API_KEY=AIzaSyAu8Jcwwn4iH2vHxJltkNE8LB7RkGGgPgg
      - OPENCLAW_MODELS_PROXY_ALLOW_UNCONFIGURED_PROVIDERS=true
    env_file:
      - ./external-tools/openclaw/.env
    volumes:
      - ./:/home/node/.openclaw/workspace
      - ./external-tools/openclaw/openclaw_config:/home/node/.openclaw
    ports:
      - "18789:18789"
      - "18790:18790"
    command: node openclaw.mjs gateway run --bind lan --allow-unconfigured --port 18789
    restart: always
